{% extends "base.html" %}
{% block title %}金句收藏庫 — 讀書筆記本{% endblock %}

{% block content %}
<div class="page-header">
    <h1>💬 金句收藏庫</h1>
    <button type="button" id="random-quote-btn" class="btn btn-secondary">🎲 今日金句</button>
</div>

<!-- 今日金句展示區（JS 動態填入） -->
<div id="daily-quote-card" class="daily-quote hidden">
    <blockquote id="daily-quote-text"></blockquote>
    <footer id="daily-quote-source"></footer>
</div>

<!-- 金句卡片格 -->
{% if books %}
<div class="quotes-grid">
    {% for book in books %}
    <div class="quote-card">
        <div class="quote-mark">"</div>
        <blockquote class="quote-text">{{ book.quote }}</blockquote>
        <div class="quote-source">
            <a href="{{ url_for('books.detail', book_id=book.id) }}" class="quote-book-link">
                《{{ book.title }}》
            </a>
            <span class="quote-author">— {{ book.author }}</span>
        </div>
        <button class="copy-btn" data-text="{{ book.quote }}" title="複製金句">
            📋 複製
        </button>
    </div>
    {% endfor %}
</div>

{% else %}
<div class="empty-state">
    <div class="empty-icon">💬</div>
    <h2>尚無金句收藏</h2>
    <p>在書籍筆記中填寫「引用金句」欄位，就會出現在這裡。</p>
    <a href="{{ url_for('books.create_form') }}" class="btn btn-primary">➕ 新增書籍筆記</a>
</div>
{% endif %}

{% endblock %}
